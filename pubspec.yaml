name: sonic_note
description: "SonicNote — Voice-powered notes app. Type or speak your thoughts, stored offline."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0

  # State Management
  flutter_riverpod: ^2.4.9

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Speech to Text
  speech_to_text: ^7.0.0

  # Permissions
  permission_handler: ^11.1.0

  # Utilities
  uuid: ^4.2.1
  intl: ^0.19.0
  path_provider: ^2.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true
